<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jing Yarong - 24岁专属星空</title>
    <style>
        body { margin: 0; background-color: #000; color: #fff; overflow: hidden; font-family: sans-serif; }
        .input_video { display: none; }
        #container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
        
        /* 银河星空背景 */
        #stars-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; 
                    background: radial-gradient(circle at center, #1a0b1c 0%, #000000 100%); }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.1; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.5); box-shadow: 0 0 8px #fff; } }

        /* 照片卡片样式 */
        .photo-card {
            width: 120px; height: 160px;
            box-shadow: 0px 0px 15px rgba(255, 105, 180, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 8px; overflow: hidden; background-color: #111;
            cursor: pointer; /* 增加鼠标手指样式 */
            animation: breathe 3s infinite alternate;
            transition: border-color 0.3s;
        }
        .photo-card:hover { border-color: #ff69b4; box-shadow: 0 0 30px rgba(255, 105, 180, 1); }
        @keyframes breathe {
            from { box-shadow: 0 0 10px rgba(255, 182, 193, 0.4); }
            to { box-shadow: 0 0 25px rgba(138, 43, 226, 0.9); }
        }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none;} /* 禁用img点击，由父容器接管 */

        /* 专属 24 岁蛋糕卡片 */
        .cake-card {
            width: 300px; height: 400px;
            background: rgba(20, 5, 30, 0.8); backdrop-filter: blur(10px);
            border: 3px solid #ff69b4; border-radius: 20px;
            box-shadow: 0 0 50px #ff69b4, inset 0 0 30px #8a2be2;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: #fff; opacity: 0; transition: opacity 1s; pointer-events: none;
        }
        .cake-age { font-size: 100px; font-weight: bold; color: #ffb6c1; text-shadow: 0 0 30px #ffb6c1; margin-bottom: 10px; font-family: 'Georgia', serif;}
        .cake-icon { font-size: 60px; margin-bottom: 20px; animation: floatUp 2s infinite alternate;}
        .cake-text { font-size: 24px; letter-spacing: 2px; text-shadow: 0 0 10px #fff; margin-bottom: 15px;}
        .cake-sig { font-size: 18px; color: #ff69b4; font-style: italic;}
        @keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-15px); } }

        /* UI 与启动按钮 */
        #ui-layer {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px);
            padding: 10px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            color: #ffb6c1; pointer-events: none; z-index: 10;
        }
        #ui-layer h2 { margin: 0 0 8px 0; font-size: 18px; text-shadow: 0 0 10px #ffb6c1;}
        #ui-layer p { margin: 4px 0; font-size: 12px; color: #eee; }
        
        #gesture-alert {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
            font-size: 20px; color: white; background: rgba(138, 43, 226, 0.7);
            backdrop-filter: blur(10px); padding: 15px 30px; border-radius: 30px; 
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 20;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.8); letter-spacing: 2px;
        }
        
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-btn {
            padding: 18px 50px; font-size: 20px; font-weight: bold; color: #fff;
            background: linear-gradient(45deg, #ff69b4, #8a2be2);
            border: 2px solid #ffb6c1; border-radius: 40px; cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.6); animation: pulse 2s infinite; letter-spacing: 2px;
        }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 105, 180, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255, 105, 180, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 105, 180, 0); } }

        /* === 新增：点击放大的魔法聚焦层 === */
        #focus-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 0, 15, 0.85); backdrop-filter: blur(12px); /* 高级毛玻璃背景 */
            z-index: 1000; display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.4s ease; flex-direction: column; cursor: pointer;
        }
        #focus-particles {
            position: absolute; top: 50%; left: 50%; width: 1px; height: 1px; z-index: 1001;
        }
        #focus-img {
            max-width: 85%; max-height: 70%;
            border: 4px solid #ffb6c1; border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.8);
            z-index: 1002; animation: floatImg 3s infinite alternate;
            pointer-events: none; /* 让点击穿透到遮罩层关闭 */
        }
        #focus-tips {
            position: absolute; bottom: 10%; color: rgba(255,255,255,0.6); font-size: 14px;
            letter-spacing: 2px; animation: breathe 2s infinite alternate; pointer-events: none;
        }
        @keyframes floatImg { from {transform: translateY(-10px) scale(1);} to {transform: translateY(10px) scale(1.02);} }
        
        /* 魔法星辰粒子特效 */
        .magic-star {
            position: absolute; width: 6px; height: 6px; border-radius: 50%; pointer-events: none;
            animation: shoot 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes shoot {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>
    <audio id="bgm" loop><source src="./bgm.mp3" type="audio/mpeg"></audio>
    <div id="stars-bg"></div>

    <div id="start-screen">
        <h1 style="color: #ffb6c1; margin-bottom: 40px; text-align: center; font-family: 'Georgia', serif;">解锁 24 岁的星空</h1>
        <button id="start-btn">触碰魔法</button>
    </div>

    <!-- 新增：魔法聚焦遮罩层 -->
    <div id="focus-overlay">
        <div id="focus-particles"></div>
        <img id="focus-img" src="" />
        <div id="focus-tips">点击任意处返回星空</div>
    </div>

    <div id="ui-layer">
        <h2>✨ 生日快乐</h2>
        <p id="status">⏳ 等待视觉链接...</p>
        <p id="layout-status">🌌 阶段 1：无垠宇宙</p>
    </div>

    <div id="gesture-alert">✨ 形态跃迁中 ✨</div>
    <video class="input_video" playsinline webkit-playsinline></video>
    <div id="container"></div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/@tweenjs/tween.js@18.6.4/dist/tween.umd.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
    <script src="https://unpkg.com/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // 生成繁星背景
        const starsBg = document.getElementById('stars-bg');
        for(let i=0; i<200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = Math.random() * 2 + 's';
            starsBg.appendChild(star);
        }

        const photoData = [];
        const totalPhotos = 40; 
        for (let i = 1; i <= totalPhotos; i++) { photoData.push(`./photos/${i}.jpg`); }

        let camera, scene, renderer;
        let targetRotationX = 0, targetRotationY = 0;
        const objects = [];
        const targets = { sphere: [], helix: [], galaxy: [], cakeRing: [] }; 
        const layoutSequence = ['sphere', 'helix', 'galaxy', 'cakeRing'];
        let currentLayoutIndex = 0; 
        let isAnimating = false;
        let cake3DObject;
        
        // 聚焦系统的控制变量
        let particleInterval;

        init3D();
        animate();

        function init3D() {
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.z = 2200; 
            scene = new THREE.Scene();

            for (let i = 0; i < photoData.length; i++) {
                const element = document.createElement('div');
                element.className = 'photo-card';
                const img = document.createElement('img');
                img.src = photoData[i];
                img.onerror = function() { this.style.display = 'none'; element.style.background = 'linear-gradient(45deg, #441122, #111)'; };
                element.appendChild(img);

                // === 核心新增：监听单张照片的点击事件 ===
                element.addEventListener('click', (e) => {
                    e.stopPropagation(); // 阻止事件冒泡
                    openMagicFocus(photoData[i]); // 触发魔法放大特效
                });

                const objectCSS = new THREE.CSS3DObject(element);
                objectCSS.position.set(Math.random() * 4000 - 2000, Math.random() * 4000 - 2000, Math.random() * 4000 - 2000);
                scene.add(objectCSS);
                objects.push(objectCSS);

                // 球体
                const phi = Math.acos(-1 + (2 * i) / photoData.length);
                const theta = Math.sqrt(photoData.length * Math.PI) * phi;
                const objSphere = new THREE.Object3D();
                objSphere.position.setFromSphericalCoords(700, phi, theta);
                objSphere.lookAt(objSphere.position.clone().multiplyScalar(2));
                targets.sphere.push(objSphere);

                // 螺旋
                const thetaHelix = i * 0.4 + Math.PI;
                const yHelix = -(photoData.length * 15) + (i * 30);
                const objHelix = new THREE.Object3D();
                objHelix.position.setFromCylindricalCoords(800, thetaHelix, yHelix);
                objHelix.lookAt(new THREE.Vector3(objHelix.position.x * 2, objHelix.position.y, objHelix.position.z * 2));
                targets.helix.push(objHelix);

                // 银河
                const angleGalaxy = i * 0.5;
                const radiusGalaxy = 200 + (i * 18);
                const objGalaxy = new THREE.Object3D();
                objGalaxy.position.x = Math.cos(angleGalaxy) * radiusGalaxy;
                objGalaxy.position.z = Math.sin(angleGalaxy) * radiusGalaxy;
                objGalaxy.position.y = (Math.random() - 0.5) * 400;
                objGalaxy.rotation.y = angleGalaxy + Math.PI / 2; 
                targets.galaxy.push(objGalaxy);

                // 蛋糕光环
                const objRing = new THREE.Object3D();
                const ringAngle = (i / photoData.length) * Math.PI * 2;
                objRing.position.x = Math.cos(ringAngle) * 1100;
                objRing.position.z = Math.sin(ringAngle) * 1100;
                objRing.lookAt(0, 0, 0); 
                targets.cakeRing.push(objRing);
            }

            const cakeEl = document.createElement('div');
            cakeEl.className = 'cake-card';
            cakeEl.id = 'cake-core';
            cakeEl.innerHTML = `<div class="cake-age">24</div><div class="cake-icon">🎂</div><div class="cake-text">Jing Yarong, 生日快乐</div><div class="cake-sig">—— 爱你的，海龙</div>`;
            cake3DObject = new THREE.CSS3DObject(cakeEl);
            scene.add(cake3DObject);

            renderer = new THREE.CSS3DRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            transform(targets.sphere, 3000); 
        }

        // === 新增：打开照片放大的魔法特效函数 ===
        function openMagicFocus(imgSrc) {
            const overlay = document.getElementById('focus-overlay');
            const imgDom = document.getElementById('focus-img');
            imgDom.src = imgSrc;
            overlay.style.display = 'flex';
            
            // 延时添加透明度动画，确保 display 生效
            setTimeout(() => { overlay.style.opacity = 1; }, 50);

            // 1. 触发一次爆发粒子
            createBurstParticles(50);
            
            // 2. 持续生成漂浮粒子
            particleInterval = setInterval(() => { createBurstParticles(3, true); }, 300);
        }

        // === 新增：关闭魔法聚焦 ===
        document.getElementById('focus-overlay').addEventListener('click', () => {
            const overlay = document.getElementById('focus-overlay');
            overlay.style.opacity = 0;
            clearInterval(particleInterval); // 停止粒子生成
            // 等待淡出动画完成后隐藏
            setTimeout(() => { 
                overlay.style.display = 'none'; 
                document.getElementById('focus-particles').innerHTML = ''; // 清空粒子
            }, 400);
        });

        // === 新增：生成星辰粒子算法 ===
        function createBurstParticles(count, isGentle = false) {
            const container = document.getElementById('focus-particles');
            const colors = ['#ffb6c1', '#ff69b4', '#8a2be2', '#ffffff']; // 粉紫白配色
            
            for(let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'magic-star';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.boxShadow = `0 0 15px ${p.style.backgroundColor}`;
                
                // 计算爆炸角度和距离
                const angle = Math.random() * Math.PI * 2;
                // Gentle 为持续生成的小距离粒子，否则为爆炸的大距离粒子
                const distance = isGentle ? (100 + Math.random() * 150) : (150 + Math.random() * 300); 
                
                p.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                
                // 给持续生成的粒子增加一个向上飘的力
                const yOffset = isGentle ? -100 : 0; 
                p.style.setProperty('--ty', (Math.sin(angle) * distance + yOffset) + 'px');
                
                // 动画时长随机
                p.style.animationDuration = (0.8 + Math.random() * 1.5) + 's';
                
                container.appendChild(p);
                
                // 粒子飞完自动销毁
                setTimeout(() => { if(p.parentNode) p.parentNode.removeChild(p); }, 2500);
            }
        }

        function transform(targetsArray, duration) {
            isAnimating = true; 
            TWEEN.removeAll();
            for (let i = 0; i < objects.length; i++) {
                new TWEEN.Tween(objects[i].position).to({ x: targetsArray[i].position.x, y: targetsArray[i].position.y, z: targetsArray[i].position.z }, Math.random() * duration + duration).easing(TWEEN.Easing.Exponential.InOut).start();
                new TWEEN.Tween(objects[i].rotation).to({ x: targetsArray[i].rotation.x, y: targetsArray[i].rotation.y, z: targetsArray[i].rotation.z }, Math.random() * duration + duration).easing(TWEEN.Easing.Exponential.InOut).start();
            }
            setTimeout(() => { isAnimating = false; }, duration * 2);
        }

        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const videoElement = document.getElementsByClassName('input_video')[0];
        const alertBox = document.getElementById('gesture-alert');
        
        startBtn.addEventListener('click', () => {
            startBtn.innerText = "启动光学引擎...";
            document.getElementById('bgm').play().catch(e => console.log("等待交互授权"));

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 320, height: 240 } })
                .then(function(stream) {
                    startScreen.style.opacity = 0;
                    setTimeout(() => startScreen.style.display = 'none', 1000);
                    document.getElementById('status').innerText = "✅ 视觉桥接完成";
                    videoElement.srcObject = stream;
                    
                    const hands = new Hands({locateFile: (file) => `https://unpkg.com/@mediapipe/hands/${file}`});
                    hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

                    let isPinching = false; 
                    hands.onResults(function(results) {
                        document.getElementById('status').innerText = "🖐️ 点击相片放大 | 捏合手势切换";
                        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                            const landmarks = results.multiHandLandmarks[0];
                            targetRotationY = (landmarks[9].x - 0.5) * Math.PI * 2.0; 
                            targetRotationX = (landmarks[9].y - 0.5) * Math.PI * 2.0;

                            const distance = Math.sqrt(Math.pow(landmarks[4].x - landmarks[8].x, 2) + Math.pow(landmarks[4].y - landmarks[8].y, 2));

                            if (distance < 0.05) { 
                                if (!isPinching && !isAnimating) {
                                    isPinching = true;
                                    currentLayoutIndex = (currentLayoutIndex + 1) % layoutSequence.length;
                                    const nextLayout = layoutSequence[currentLayoutIndex];
                                    const cakeDom = document.getElementById('cake-core');
                                    
                                    if (nextLayout === 'sphere') {
                                        transform(targets.sphere, 2500);
                                        document.getElementById('layout-status').innerText = "🌌 阶段 1：无垠宇宙"; alertBox.innerText = "回归原点"; cakeDom.style.opacity = 0;
                                    } else if (nextLayout === 'helix') {
                                        transform(targets.helix, 2500);
                                        document.getElementById('layout-status').innerText = "🌌 阶段 2：时光隧道"; alertBox.innerText = "时光倒流"; cakeDom.style.opacity = 0;
                                    } else if (nextLayout === 'galaxy') {
                                        transform(targets.galaxy, 2500);
                                        document.getElementById('layout-status').innerText = "🌌 阶段 3：浩瀚银河"; alertBox.innerText = "星系形成"; cakeDom.style.opacity = 0;
                                    } else if (nextLayout === 'cakeRing') {
                                        transform(targets.cakeRing, 3000);
                                        document.getElementById('layout-status').innerText = "🎂 终极彩蛋：24岁降临"; alertBox.innerText = "✨ 核心解锁 ✨";
                                        setTimeout(() => { cakeDom.style.opacity = 1; }, 1500);
                                    }
                                    alertBox.style.opacity = 1; setTimeout(() => { alertBox.style.opacity = 0; }, 2000);
                                }
                            } else { isPinching = false; }
                        }
                    });
                    new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 320, height: 240 }).start();
                });
        });

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            scene.rotation.y += (targetRotationY - scene.rotation.y) * 0.15; 
            scene.rotation.x += (targetRotationX - scene.rotation.x) * 0.15;
            if(cake3DObject) cake3DObject.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
